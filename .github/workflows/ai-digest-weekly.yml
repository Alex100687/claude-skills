name: AI Weekly Digest

on:
  schedule:
    # Каждое воскресенье в 9:00 по московскому времени (UTC+3 → 06:00 UTC)
    - cron: '0 6 * * 0'
  workflow_dispatch:
    # Кнопка "Run workflow" в GitHub — для ручного запуска и тестирования

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-generativeai

      - name: Run AI Digest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          python My_Knowledge_Base/Scripts/ai_digest.py
